name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest

      - name: Determine version
        id: version
        run: |
          CURRENT=$(svu current)
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$NEXT" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.bump == 'true'
        run: |
          git tag ${{ steps.version.outputs.next }}
          git push origin ${{ steps.version.outputs.next }}

      - name: Create GitHub release
        if: steps.version.outputs.bump == 'true'
        run: gh release create ${{ steps.version.outputs.next }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.version.outputs.bump == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.version.outputs.bump == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.version.outputs.bump == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/rossgrat/wubzduh:${{ steps.version.outputs.next }}
            ghcr.io/rossgrat/wubzduh:latest
